name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows (x64)
            rust-target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macOS (Universal)
            rust-target: aarch64-apple-darwin x86_64-apple-darwin
          - os: ubuntu-latest
            platform: Linux (x64)
            rust-target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AIKeyVault ${{ github.ref_name }}'
          releaseBody: |
            ---
            > 🔒 **100% Local. Zero Network Requests.** Your data never leaves your machine.
            ---

            ## 🎨 AIKeyVault v1.0.1 — Provider Icons Update

            All 24 AI provider icons now use official brand SVGs, replacing the previous Lucide icon fallbacks.

            ### ✨ What's New

            - 🎨 **24 Official Provider Icons** — All providers in the dropdown now display authentic brand SVGs: OpenAI, Anthropic, Google Gemini, DeepSeek, xAI (Grok), Mistral AI, Groq, Cohere, Alibaba (Qwen), ByteDance (Doubao), MiniMax, Moonshot (Kimi), Zhipu (GLM), Baichuan, Baidu (Wenxin), Tencent (Hunyuan), Microsoft (Azure), Amazon (Bedrock), Meta, NVIDIA, Ollama, LM Studio, OpenRouter, SiliconFlow
            - 📦 **27 Icon Components** — New dedicated icon components in `src/components/icons/providers/`, sourced from Simple Icons and LobeHub
            - 🔧 **Dark Mode Compatible** — All icons use `currentColor` with Tailwind `dark:` variants for correct rendering in both themes

            ### 🔧 v1.0.1 更新内容

            - 🎨 **24 个官方供应商图标** — 下拉列表中所有供应商现均显示真实品牌 SVG：OpenAI、Anthropic、Google Gemini、DeepSeek、xAI (Grok)、Mistral AI、Groq、Cohere、阿里 (千问)、字节 (豆包)、MiniMax、月之暗面 (Kimi)、智谱 (GLM)、百川、百度 (文心)、腾讯 (混元)、微软 (Azure)、Amazon (Bedrock)、Meta、NVIDIA、Ollama、LM Studio、OpenRouter、硅基流动
            - 📦 **27 个图标组件** — `src/components/icons/providers/` 目录下新增专有图标组件，数据来源 Simple Icons 和 LobeHub
            - 🔧 **暗色模式适配** — 所有图标使用 `currentColor` + Tailwind `dark:` 变体，两种主题下均正确渲染

            ---

            ### ✨ Core Features / 核心特性

            - 🔐 **AES-256-GCM 加密** — 每条密钥独立随机 nonce 加密，Argon2id 密钥派生（16 MiB）
            - ⚡ **类 Raycast 启动器** — `Ctrl+Shift+Space` 唤起毛玻璃搜索窗口，纯键盘操作
            - 🔒 **自动锁定 & 内存零化** — 闲置超时自动锁定，主密钥从内存中安全擦除
            - 🌍 **多语言支持** — 简体中文、English、日本語、한국어
            - 📦 **加密备份** — 导出 `.kvx` 加密文件，安全跨设备迁移
            - 🎨 **暗色玻璃拟态 UI** — 透明窗口，毛玻璃效果，现代化设计

            - 🔐 **AES-256-GCM Encryption** — Per-key random nonce with Argon2id key derivation (16 MiB)
            - ⚡ **Raycast-Style Launcher** — `Ctrl+Shift+Space` brings up a glassmorphism search window
            - 🔒 **Auto-Lock & Memory Zeroing** — Idle timeout locks vault, master key securely wiped from RAM
            - 🌍 **Multi-Language** — English, 简体中文, 日本語, 한국어
            - 📦 **Encrypted Backup** — Export to `.kvx` file for safe cross-device transfer
            - 🎨 **Dark Glassmorphism UI** — Transparent blur-glass window, modern design

            ---

            ### 📥 Downloads

            | Platform | Architecture | Package |
            |----------|-------------|---------|
            | 🪟 Windows | x64 (also runs on ARM64 via PRISM) | `.msi` / `.exe` / `.zip` (portable) |
            | 🍎 macOS | Universal (Intel + Apple Silicon) | `.dmg` |
            | 🐧 Linux | x64 | `.deb` / `.rpm` / `.AppImage` |

            > 💡 **Portable (.zip)**: No installation required — extract and run `AIKeyVault.exe` directly.
            > **Windows requires WebView2 Runtime** (pre-installed on Windows 11).

            ### 🔧 Quick Start

            ```bash
            # Or build from source:
            git clone https://github.com/Awfp1314/AIKeyVault.git
            cd AIKeyVault
            npm install
            npm run tauri build
            ```
          releaseDraft: false
          prerelease: false

      - name: Create portable zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path src-tauri/target/release/aikeyvault.exe -DestinationPath AIKeyVault_portable_x64.zip -Force

      - name: Upload portable zip to release
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} AIKeyVault_portable_x64.zip --repo Awfp1314/AIKeyVault --clobber
