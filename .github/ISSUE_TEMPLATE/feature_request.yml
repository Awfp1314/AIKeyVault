name: ✨ Feature Request (功能请求)
description: 对 AIKeyVault 有新的想法或建议？
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出您的奇思妙想！
  - type: textarea
    id: problem
    attributes:
      label: 🎯 痛点描述
      description: 这个新功能是为了解决什么问题？(例如："我每次都要手动清除剪贴板，感觉很不安全...")
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 💡 期望的解决方案
      description: 您希望 AIKeyVault 怎么做？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 替代方案 (可选)
      description: 您目前是用什么其他方式解决这个问题的？
