name: ✨ Feature Request / 功能请求
description: Suggest a new feature or improvement / 对 AIKeyVault 有新的想法或建议？
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas! / 欢迎提出您的奇思妙想！
  - type: textarea
    id: problem
    attributes:
      label: 🎯 Problem / 痛点描述
      description: What problem does this feature solve? (e.g. "I have to manually clear my clipboard every time...") / 这个新功能是为了解决什么问题？（例如："我每次都要手动清除剪贴板，感觉很不安全..."）
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution / 期望的解决方案
      description: What would you like AIKeyVault to do? / 您希望 AIKeyVault 怎么做？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives (optional) / 替代方案（可选）
      description: Any workarounds you're currently using? / 您目前是用什么其他方式解决这个问题的？
