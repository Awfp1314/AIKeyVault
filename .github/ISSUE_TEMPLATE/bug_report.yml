name: 🐛 Bug Report / 问题反馈
description: Report a bug or unexpected behavior in AIKeyVault / 报告一个运行错误
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this! The more detail you provide, the faster we can fix it.
        感谢您抽出时间提交此问题！信息越详细，我们定位越快。
  - type: dropdown
    id: os
    attributes:
      label: 🖥 Operating System / 操作系统
      description: Which OS are you using? / 您在哪种操作系统上遇到了此问题？
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon M1/M2/M3)
        - macOS (Intel)
        - Linux (Ubuntu/Debian)
        - Linux (Arch/其他)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 📦 AIKeyVault Version / 版本号
      description: Check in tray menu or Settings / 可在系统托盘菜单或设置中查看
      placeholder: e.g. v1.0.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 🔄 Steps to Reproduce / 复现步骤
      description: What steps trigger the bug? / 请描述如何才能触发这个 Bug？
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 🤔 Expected vs Actual / 期望结果 vs 实际结果
      description: What did you expect to happen, and what actually happened? / 您原本期望发生什么，但实际上发生了什么？
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots / Logs (optional) / 截图 / 报错日志（可选）
      description: Drag and drop screenshots or paste error logs here / 拖拽截图或粘贴报错日志到这里
